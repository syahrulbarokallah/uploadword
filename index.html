<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Word Document Upload</title>\n</head>\n<body>\n    <h1>Upload Word Document</h1>\n    <input type="file" id="fileInput" accept=".doc,.docx">\n    <button id="uploadButton">Upload</button>\n    <canvas id="canvas" style="border:1px solid black;"></canvas>\n    <script>\n        document.getElementById('uploadButton').addEventListener('click', function() {\n            const input = document.getElementById('fileInput');\n            const file = input.files[0];\n            if (file) {\n                // Logic to read and display the word document on the canvas will be added here.\n                alert('File ready to upload: ' + file.name);\n            } else {\n                alert('Please select a file to upload.');\n            }\n        });\n    <\/script>\n</body>\n</html>
